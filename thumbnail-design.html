<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>액션바 시안</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f0;
      padding: 40px 20px;
      color: #1a1a1a;
    }

    .page-title {
      max-width: 900px;
      margin: 0 auto 12px;
      font-size: 20px;
      font-weight: 800;
    }

    .page-desc {
      max-width: 900px;
      margin: 0 auto 32px;
      font-size: 13px;
      color: #6b7280;
    }

    .compare {
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 900px;
      margin: 0 auto;
    }

    .case {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .case-label {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 700;
      background: #1a1a1a;
      color: #fff;
      letter-spacing: 0.05em;
    }

    .action-bar {
      padding: 8px 16px;
      border-top: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #6b7280;
      padding: 8px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .btn:hover { color: #111; background: #f3f4f6; }
    .btn.liked { color: #ef4444; }

    .icon { font-size: 18px; line-height: 1; }

    .divider {
      width: 1px;
      height: 18px;
      background: #e5e7eb;
      margin: 0 8px;
    }

    .spacer { flex: 1; }

    /* 드롭다운 시뮬레이션 */
    .dropdown-wrap {
      position: relative;
      display: inline-block;
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      min-width: 140px;
      z-index: 10;
      overflow: hidden;
    }

    .dropdown-item {
      display: block;
      padding: 10px 14px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .dropdown-item:hover { background: #f3f4f6; }
    .dropdown-item.danger { color: #ef4444; }
    .dropdown-item.danger:hover { background: #fef2f2; }

    .dropdown-sep {
      height: 1px;
      background: #f0f0f0;
      margin: 4px 0;
    }

    .dropdown-wrap:hover .dropdown { display: block; }

    /* 포스트 내용 미리보기 */
    .post-preview {
      padding: 20px 16px;
    }

    .post-preview .title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .post-preview .meta {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    .post-preview .body {
      font-size: 14px;
      color: #374151;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<div class="page-title">액션바 배치 시안</div>
<div class="page-desc">작성자 기준 (수정/삭제 표시)</div>

<div class="compare">

  <!-- A안 -->
  <div class="case">
    <div class="case-label">A안 — 수정/삭제를 … 드롭다운 안으로</div>
    <div class="post-preview">
      <div class="title">포스트 제목입니다</div>
      <div class="meta">test · 5일 전</div>
    </div>
    <div class="action-bar">
      <!-- 좌: 좋아요, 댓글 -->
      <button class="btn liked">
        <span class="icon">♥</span> 1
      </button>
      <button class="btn">
        <span class="icon">💬</span> 3
      </button>

      <div class="spacer"></div>

      <!-- 우: 더보기(수정/삭제 포함) -->
      <div class="dropdown-wrap">
        <button class="btn">
          <span class="icon">•••</span>
        </button>
        <div class="dropdown">
          <button class="dropdown-item">링크 복사</button>
          <button class="dropdown-item">Twitter / X</button>
          <button class="dropdown-item">Facebook</button>
          <div class="dropdown-sep"></div>
          <button class="dropdown-item">수정</button>
          <button class="dropdown-item danger">삭제</button>
          <div class="dropdown-sep"></div>
          <button class="dropdown-item danger">신고하기</button>
        </div>
      </div>
    </div>
    <div style="padding: 16px; border-top: 1px solid #f0f0f0; font-size:14px; color:#374151; line-height:1.7;">본문 내용...</div>
  </div>

  <!-- B안 -->
  <div class="case">
    <div class="case-label">B안 — 좌측 ♥ 💬, 우측 ••• 수정 삭제</div>
    <div class="post-preview">
      <div class="title">포스트 제목입니다</div>
      <div class="meta">test · 5일 전</div>
    </div>
    <div class="action-bar">
      <!-- 좌: 좋아요, 댓글 -->
      <button class="btn liked">
        <span class="icon">♥</span> 1
      </button>
      <button class="btn">
        <span class="icon">💬</span> 3
      </button>

      <div class="spacer"></div>

      <!-- 우: 더보기, 수정, 삭제 -->
      <div class="dropdown-wrap">
        <button class="btn">
          <span class="icon">•••</span>
        </button>
        <div class="dropdown">
          <button class="dropdown-item">링크 복사</button>
          <button class="dropdown-item">Twitter / X</button>
          <button class="dropdown-item">Facebook</button>
          <div class="dropdown-sep"></div>
          <button class="dropdown-item danger">신고하기</button>
        </div>
      </div>
      <div class="divider"></div>
      <button class="btn" style="font-size:13px; color:#6b7280;">수정</button>
      <button class="btn" style="font-size:13px; color:#6b7280;">삭제</button>
    </div>
    <div style="padding: 16px; border-top: 1px solid #f0f0f0; font-size:14px; color:#374151; line-height:1.7;">본문 내용...</div>
  </div>

</div>
</body>
</html>
